<!DOCTYPE html>
<html lang="en-GB">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base Document</title>
  <style>
    @font-face {
      font-family: 'Andika';
      src: url('file:///{{ fonts_dir }}/Andika-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Andika';
      src: url('file:///{{ fonts_dir }}/Andika-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'Andika';
      src: url('file:///{{ fonts_dir }}/Andika-Italic.ttf') format('truetype');
      font-weight: 400;
      font-style: italic;
    }

    @page {
      size: 148mm 210mm;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 148mm;
      height: 210mm;
      font-family: 'Andika', sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      width: 148mm;
      height: 210mm;
      position: relative;
      overflow: hidden;
      page-break-after: always;
      page-break-inside: avoid;
    }

    .page:last-child {
      page-break-after: avoid;
    }

    .page-inner {
      width: 100%;
      height: 100%;
      padding: 12mm;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
  {% block content %}{% endblock %}
</body>

</html>
