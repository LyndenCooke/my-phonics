<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Preview</title>
    <style>
        .preview-container {
            position: relative;
        }

        /* This perfectly mimics the new CSS from your book_templates/book.html */
        @import url('https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        body {
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Andika', sans-serif;
        }

        .page {
            /* Strictly A5 size just like the PDF */
            width: 148mm;
            height: 210mm;
            background-color: white;
            box-shadow: 0 10mm 20mm rgba(0, 0, 0, 0.15);
        }

        .cover {
            /* The Canva Placeholder Background */
            background-image: url('https://placehold.co/1748x2480/E84B8A/ffffff.png?text=Your+Premium+Canva+Design+Goes+Here');
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 2px;
        }

        .cover-illustration {
            /* Floating illustration box */
            position: absolute;
            top: 60mm;
            left: 24mm;
            width: 100mm;
            height: 100mm;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 5mm;
            background-color: rgba(255, 255, 255, 0.8);
            border: 2px dashed #fff;
        }

        .cover-illustration img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-title-area {
            /* Floating title text at the bottom */
            position: absolute;
            bottom: 25mm;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 0 10mm;
            box-sizing: border-box;
        }

        .cover-title {
            color: #ffffff;
            font-size: 26pt;
            font-weight: 700;
            line-height: 1.15;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.4);
        }

        .cover-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13pt;
            font-style: italic;
            margin-top: 2mm;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }

        .helper-text {
            position: absolute;
            top: -20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: sans-serif;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>

<body>

    <div class="preview-container">
        <div class="helper-text">This bounding box is exactly A5 size (148mm x 210mm)</div>

        <div class="page cover">

            <div class="cover-illustration">
                <!-- Example Illustration image from placehold.co -->
                <img src="https://placehold.co/800x800/22C55E/ffffff.png?text=Cute+Character+Art"
                    alt="Cover illustration">
            </div>

            <div class="cover-title-area">
                <div class="cover-title">The Lost Doll</div>
                <div class="cover-subtitle">A story for Emma</div>
            </div>

        </div>
    </div>

</body>

</html>
